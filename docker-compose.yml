version: "3.9"

services:
  labuu-bot:
    build: ./backend
    container_name: labuu-marketing-bot
    restart: always
    ports:
      - "8000:8000"   # Acesso público direto via IP:8000
    volumes:
      - ./uploads:/app/uploads   # fallback local (Supabase Storage é o principal)
      - ./frontend:/app/../frontend
    env_file:
      - .env
    networks:
      - labuu_net

networks:
  labuu_net:
    name: labuu_labuu_net
    external: true
